services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: me_dev
      POSTGRES_USER: me_user
      POSTGRES_PASSWORD: me_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U me_user -d me_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot container that creates the default bucket on first run.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/pawsnap &&
        mc anonymous set public local/pawsnap
      "
    restart: "no"

  # CloudBeaver — web UI cho PostgreSQL (phiên bản web của DBeaver)
  # Mở http://<PUBLIC_HOST>:8978 sau khi khởi động
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://me_user:me_pass@postgres/me_dev
      REDIS_URL: redis://redis:6379/0
      AUTH_MODE: jwt
      JWT_SECRET_KEY: change-me-in-production
      JWT_EXPIRE_DAYS: "30"
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT_URL: http://minio:9000
      # Browser upload: presigned URL phải trỏ host mà client bên ngoài reach được
      # Dùng HTTPS endpoint (cùng nginx) để tránh mixed-content khi app chạy HTTPS
      MINIO_PUBLIC_ENDPOINT_URL: https://${PUBLIC_HOST:-localhost}:8443
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      S3_BUCKET: pawsnap
      AWS_REGION: us-east-1
      # Leave FIREBASE_CREDENTIALS_JSON empty for standalone mode.
      FIREBASE_CREDENTIALS_JSON: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Flutter web — nginx phục vụ static + proxy /api → backend
  # HTTP  http://<PUBLIC_HOST>:8080  → redirect 301 → HTTPS
  # HTTPS https://<PUBLIC_HOST>:8443 → app (camera hoạt động)
  # Cert: chạy `make gen-certs PUBLIC_HOST=<IP>` trước khi up
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  cloudbeaver_data:
