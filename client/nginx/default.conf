server {
    listen 80;
    server_name _;
    # Redirect plain HTTP → HTTPS (port 8443 on host).
    return 301 https://$host:8443$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/local.crt;
    ssl_certificate_key /etc/nginx/certs/local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API — browser dùng cùng origin (LAN IP / domain :8443)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MinIO bucket proxy — presigned PUT (upload) + GET (serve ảnh) qua HTTPS
    # Loại bỏ mixed-content khi app chạy trên https://
    # ^~ ngăn regex location (caching rule *.jpg) chiếm quyền ưu tiên
    location ^~ /pawsnap/ {
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        # Giữ nguyên Host để MinIO verify SigV4 signature
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        # Cần thiết cho PUT lớn (ảnh)
        proxy_request_buffering off;
        client_max_body_size 20m;
    }

    # Flutter web + go_router client-side routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Service worker + bootstrap must never be cached so browsers always
    # pick up new deployments immediately.
    location ~* (flutter_service_worker\.js|flutter_bootstrap\.js)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Cache hashed Flutter assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
